version: 2

models:
  - name: int_station_daily_net_flow
    description: >
      An intermediate model with a granularity of one row per station per day.
      It combines the journey starts and ends to calculate the daily net flow (whether the station ends up with more or less bikes than
      it started with at the start of the day), and adds calendar information so it can be reused downstream.
    columns:
      - name: station_name
        description: The station that the journey started/ended at
      - name: journey_date
        description: The date in YYYY-MM-DD that the journey started/ended
      - name: day_of_week
        description: The day of the week that journey_date corresponds to
      - name: weekday_or_weekend
        description: Whether journey_date falls on a weekday or a weekend
      - name: journeys_started
        description: The number (integer) of journeys that started at this station_name on journey_date
      - name: journeys_ended
        description: The number (integer) of journeys that ended at this station_name on journey_date      
      - name: net_flow_journeys
        description: journeys_ended minus journeys_started

  - name: mart_station_net_flow_weekday_weekend
    description: >
      An aggregated mart which uses int_station_daily_net_flow to provide weekday vs. weekend seasonality metrics per station
    columns:
      - name: station_name
        description: The station that the journey started/ended at
      - name: weekday_or_weekend
        description: Indicates whether the aggregated metrics relate to Weekday or Weekend
      - name: average_daily_net_flow
        description: The average net flow per day for the station and day type
      - name: total_journeys_started
        description: The total number of journeys started for the station and day type
      - name: total_journeys_ended
        description: The total number of journeys ended for the station and day type
      - name: total_yearly_net_flow
        description: The sum of net flows across all the days the the station and day type (in the whole dataset i.e. 2024)

  - name: fct_cycle_journeys
    description: >
      Fact table with one row per cycle hire journey. Joins staged journey data
      with docking station metadata for both start and end stations. Left joins
      are used to preserve all journeys, including those where a station has since
      been decommissioned and is absent from the station dimension.
    columns:
      - name: journey_id
        description: Unique identifier for each bike hire journey
        data_tests:
          - not_null
          - unique
      - name: started_on_utc
        description: Journey start datetime in UTC
      - name: started_on_hour
        description: Hour extracted from started_on_utc, for time-of-day analysis
      - name: started_on_day_of_week
        description: Full day name (e.g. Monday) derived from started_on_utc
      - name: journey_started_weekday_or_weekend
        description: Whether the journey started on a weekday or weekend
      - name: ended_on_utc
        description: Journey end datetime in UTC
      - name: start_station_name
        description: Name of the station where the journey started
      - name: start_station_latitude
        description: Latitude of the start station, null if station is decommissioned
      - name: start_station_longitude
        description: Longitude of the start station, null if station is decommissioned
      - name: start_station_number_of_docks
        description: Total dock count at the start station, null if station is decommissioned
      - name: end_station_name
        description: Name of the station where the journey ended
      - name: end_station_latitude
        description: Latitude of the end station, null if station is decommissioned
      - name: end_station_longitude
        description: Longitude of the end station, null if station is decommissioned
      - name: end_station_number_of_docks
        description: Total dock count at the end station, null if station is decommissioned
      - name: bike_model
        description: Type of bike hired (CLASSIC or PBSC_EBIKE)
      - name: journey_duration_hr_min_string
        description: Journey duration as a human-readable hours and minutes string
      - name: journey_duration_seconds
        description: Journey duration in seconds, converted from milliseconds
